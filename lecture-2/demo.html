<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xpense Lesson - Finished</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans">
    <main class="max-w-5xl mx-auto p-6">
      <nav
        class="flex items-center justify-between py-6 border-b border-gray-200"
      >
        <h1 class="text-2xl font-black text-indigo-600 tracking-tighter">
          XpenseApp
        </h1>
        <ul class="flex items-center gap-6 font-medium">
          <li>
            <a href="#" class="hover:text-indigo-600 transition">Features</a>
          </li>
          <li>
            <a href="#" class="hover:text-indigo-600 transition">Pricing</a>
          </li>
          <li>
            <button
              class="bg-indigo-600 text-white px-5 py-2 rounded-full hover:bg-indigo-700 shadow-md transition cursor-pointer"
            >
              Login
            </button>
          </li>
        </ul>
      </nav>

      <section class="py-20 text-center">
        <h2 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
          Track your expenses <span class="text-indigo-600">effortlessly.</span>
        </h2>
        <p class="text-lg text-gray-600 max-w-2xl mx-auto mb-10">
          The smartest way to manage your personal finance in 2026. Join over
          10,000 users worldwide.
        </p>
        <div class="flex justify-center gap-4">
          <button
            class="bg-gray-900 text-white px-8 py-3 rounded-lg font-semibold hover:scale-105 transition transform"
          >
            Get Started
          </button>
          <button
            class="border border-gray-300 px-8 py-3 rounded-lg font-semibold hover:bg-white shadow-sm transition"
          >
            View Demo
          </button>
        </div>
      </section>

      <div
        class="max-w-sm mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100 hover:border-indigo-200 transition"
      >
        <div
          class="w-12 h-12 bg-indigo-100 rounded-lg flex items-center justify-center mb-4"
        >
          <span class="text-indigo-600">🛡️</span>
        </div>
        <h3 class="text-xl font-bold mb-2">Secure Sync</h3>
        <p class="text-gray-500 leading-relaxed">
          Your data is encrypted and synced across all devices instantly. Never
          lose a receipt again.
        </p>
      </div>
    </main>
  </body>
</html>
