<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Mastery - Tailwind v4</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 font-sans antialiased">
    <header class="bg-white border-b border-gray-200 px-6 py-4">
      <nav class="flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-2xl font-black text-blue-600 tracking-tighter">
          FLEX.IO
        </div>

        <ul class="flex items-center gap-6 text-sm font-semibold text-gray-600">
          <li class="hover:text-blue-600 cursor-pointer transition-colors">
            Dashboard
          </li>
          <li
            class="hover:text-blue-600 cursor-pointer transition-colors border-b-2 border-blue-600 text-blue-600"
          >
            Projects
          </li>
          <li class="hover:text-blue-600 cursor-pointer transition-colors">
            Team
          </li>
        </ul>

        <div class="flex items-center gap-3">
          <button
            class="p-2 text-gray-400 hover:text-gray-600 flex items-center justify-center"
          >
            <span class="sr-only">Notifications</span>
            <div
              class="w-2 h-2 bg-red-500 rounded-full absolute translate-x-2 -translate-y-2"
            ></div>
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
              ></path>
            </svg>
          </button>
          <div
            class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-full border-2 border-white shadow-md"
          ></div>
        </div>
      </nav>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
      <section class="flex flex-col lg:flex-row gap-6">
        <aside class="flex-none w-full lg:w-64 space-y-4">
          <div
            class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200"
          >
            <h3 class="font-bold mb-4">Categories</h3>
            <div class="flex flex-wrap gap-2">
              <span
                class="flex-1 text-center py-2 px-3 bg-blue-50 text-blue-700 rounded-lg text-xs font-bold"
                >Design</span
              >
              <span
                class="flex-1 text-center py-2 px-3 bg-purple-50 text-purple-700 rounded-lg text-xs font-bold"
                >Dev</span
              >
              <span
                class="flex-1 text-center py-2 px-3 bg-green-50 text-green-700 rounded-lg text-xs font-bold"
                >Marketing</span
              >
            </div>
          </div>
        </aside>

        <article
          class="flex-1 bg-white p-8 rounded-2xl shadow-sm border border-gray-200"
        >
          <div
            class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4"
          >
            <div>
              <h1 class="text-2xl font-bold">Project Overview</h1>
              <p class="text-gray-500">Manage your workspace flex settings.</p>
            </div>
            <button
              class="flex-none bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition-all"
            >
              + New Project
            </button>
          </div>

          <div class="flex flex-col md:flex-row flex-wrap gap-4">
            <div
              class="flex-1 min-w-[250px] p-4 border border-gray-100 bg-gray-50 rounded-xl flex items-center gap-4"
            >
              <div
                class="flex-none w-12 h-12 bg-white rounded-lg shadow-sm flex items-center justify-center text-xl"
              >
                🚀
              </div>
              <div class="flex-1">
                <div class="text-sm font-bold">Growth Rate</div>
                <div class="text-xs text-gray-400">+12% this month</div>
              </div>
            </div>
            <div
              class="flex-1 min-w-[250px] p-4 border border-gray-100 bg-gray-50 rounded-xl flex items-center gap-4"
            >
              <div
                class="flex-none w-12 h-12 bg-white rounded-lg shadow-sm flex items-center justify-center text-xl"
              >
                🎯
              </div>
              <div class="flex-1">
                <div class="text-sm font-bold">Active Tasks</div>
                <div class="text-xs text-gray-400">24 Pending items</div>
              </div>
            </div>
          </div>
        </article>

        <aside
          class="order-first lg:order-last flex-none w-full lg:w-72 bg-blue-900 text-white p-6 rounded-2xl shadow-xl"
        >
          <h3 class="text-lg font-bold mb-2">Pro Tip</h3>
          <p class="text-blue-200 text-sm leading-relaxed">
            Use <code class="bg-blue-800 px-1 rounded">order-first</code> to
            move important alerts to the top of the stack on mobile devices!
          </p>
        </aside>
      </section>
    </main>
  </body>
</html>
